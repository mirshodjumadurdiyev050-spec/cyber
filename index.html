<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Cryptographic Laboratory V2.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "fpdf2", "pycryptodome"], // Install requirements in browser
        entrypoint: "main.py",
        files: {
          "main.py": {
            url: "main.py"
          },
          "logic/classical.py": {
            url: "logic/classical.py"
          },
          "logic/rsa.py": {
            url: "logic/rsa.py"
          },
          "logic/hashing.py": {
            url: "logic/hashing.py"
          },
          "logic/pdf_gen.py": {
            url: "logic/pdf_gen.py"
          },
          "assets/styles.css": {
            url: "assets/styles.css"
          }
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
